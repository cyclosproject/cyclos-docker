upstream cyclos_cluster {
    # ip_hash is recommended for Cyclos to keep user sessions on the same node
    ip_hash; 
    server cyclos:8080;
}

server {
    listen 80;
    location / {
        proxy_pass http://cyclos_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Ensure long-running Cyclos processes don't timeout
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}