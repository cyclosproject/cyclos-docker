services:
  # One-shot initializer: Fixes all permission issues for hardened images
  init:
    image: dhi.io/bash:5
    user: "0"
    environment:
      DOMAIN: ${DOMAIN:-example.com}
    volumes:
      - ./traefik:/traefik-data
      - ./cyclos/runtime-secrets:/cyclos-runtime
      - ./cyclos/logs:/cyclos-logs
      - ./cyclos/tomcat-logs:/tomcat-logs
      - ./secrets/db_password.txt:/source_secret:ro
    command: >
      bash -c "
        # 1. Setup Traefik acme.json
        touch /traefik-data/acme.json && 
        chmod 600 /traefik-data/acme.json && 
        chown 65532:65532 /traefik-data/acme.json &&

        # 2. Fix Traefik Config Permissions
        if [ -f /traefik-data/configuration.yml ]; then
          chown 65532:65532 /traefik-data/configuration.yml;
        fi &&

        # 3. Fix Cyclos Log Permissions
        mkdir -p /cyclos-logs /tomcat-logs &&
        chown -R 65532:65532 /cyclos-logs /tomcat-logs &&

        # 4. Setup Cyclos Secret
        mkdir -p /cyclos-runtime &&
        cp /source_secret /cyclos-runtime/db_password &&
        chown 65532:65532 /cyclos-runtime/db_password &&
        chmod 400 /cyclos-runtime/db_password
      "
    restart: 'no'

  # Use Traefik as a reverse proxy to route traffic to the Cyclos application
  traefik:
    image: dhi.io/traefik:3
    command:
      - --api.dashboard=false
      - --providers.file.filename=/etc/traefik/configuration.yml
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.web.http.redirections.entryPoint.permanent=true
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${LETS_ENCRYPT_EMAIL:-you@example.com}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-example.com}
    volumes:
      - ./traefik/acme.json:/acme/acme.json
      - ./traefik/configuration.yml:/etc/traefik/configuration.yml:ro
    restart: unless-stopped
    networks:
      - cyclos-net

  # Cyclos application container
  cyclos:
    image: cyclos/cyclos:${CYCLOS_VERSION}
    environment:
      DB_HOST: db
      DB_NAME: cyclos
      DB_USER: cyclos
      DB_PASSWORD_FILE: /run/runtime-secrets/db_password
      JAVA_OPTS: >-
        -Xmx${MAX_JVM_MEMORY:-4096m}
        -Dcyclos.header.remoteAddress=X-Forwarded-For
        -Dcyclos.header.protocol=X-Forwarded-Proto
        -Dcyclos.header.remoteAddress.index=-1
    volumes:
      - ./cyclos/logs:/var/log/cyclos
      - ./cyclos/tomcat-logs:/usr/local/tomcat/logs
      - ./cyclos/runtime-secrets:/run/runtime-secrets:ro
    restart: unless-stopped
    networks:
      - cyclos-net
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  # The PostgreSQL database
  db:
    image: postgis/postgis:18-3.6-alpine
    environment:
      POSTGRES_DB: cyclos
      POSTGRES_USER: cyclos
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: 
        - "CMD-SHELL"
        - |
          pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1;
          if [ -n "$(ls -A /docker-entrypoint-initdb.d/ 2>/dev/null)" ]; then
            psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c "SELECT 1 FROM information_schema.tables WHERE table_name = 'application';" | grep -q 1 || exit 1;
          fi
      interval: 5s
      timeout: 5s
      retries: 100
      start_period: 10s
    restart: unless-stopped
    networks:
      - cyclos-net
    secrets:
      - db_password

networks:
  cyclos-net:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password.txt
